name: CI

on:
  push:
    branches: [local, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python, wheel, CLI and notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.1,<3.0"
          python -m pip install -e ".[all]"
      - name: Ruff
        run: |
          ruff check src tests
          ruff check src --select D101,D102,D103
      - name: Tests
        run: pytest -q
      - name: Notebook lint
        run: nbqa ruff notebooks
      - name: Build and audit wheel
        run: |
          python -m build --wheel
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("*.whl"))
          expected = {
              "preprocess.py", "sample.py", "sample_prior.py", "train_prior.py",
              "validate_mira.py", "validate_pqmass.py",
          }
          with ZipFile(wheel) as archive:
              names = {Path(name).name for name in archive.namelist()}
          missing = expected - names
          if missing:
              raise SystemExit(f"wheel missing source modules: {sorted(missing)}")
          PY
      - name: CLI smoke tests
        run: |
          for command in preprocess-probes train-prior train-prior-lowres sample-posterior sample-prior validate-chi2 validate-pqmass validate-mira reproduce-figure2; do
            "$command" --help >/dev/null
          done
          validate-mira --smoke-test --device cpu --num-runs 4 --num-bootstrap 4 >/dev/null

  shell:
    name: Bash, ShellCheck and shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shell tooling
        run: sudo apt-get update && sudo apt-get install --yes shellcheck shfmt
      - name: Bash syntax
        run: bash -n scripts/lib/hpc_common.sh scripts/run_stage2.sh scripts/run_stage3.sh scripts/run_sample.sh scripts/run_sample_prior.sh
      - name: ShellCheck warnings as errors
        run: shellcheck --severity=warning scripts/lib/hpc_common.sh scripts/run_stage2.sh scripts/run_stage3.sh scripts/run_sample.sh scripts/run_sample_prior.sh
      - name: shfmt
        run: shfmt -d -i 4 scripts/lib/hpc_common.sh scripts/run_stage2.sh scripts/run_stage3.sh scripts/run_sample.sh scripts/run_sample_prior.sh
      - name: Ban legacy launcher patterns
        run: |
          if grep -R -n -E '(^|[^[:alnum:]_])eval([^[:alnum:]_]|$)|`|machine\.file|PBS_NODEFILE|mpirun|mpiexec|OMPI_MCA|(^|[[:space:]])np=' scripts; then
            echo "Legacy HPC launcher pattern detected" >&2
            exit 1
          fi

  docs:
    name: Sphinx warnings as errors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install CPU documentation environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.1,<3.0"
          python -m pip install -e ".[docs]"
      - run: sphinx-build -W --keep-going -b html docs docs/_build/html

  container:
    name: CPU container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build --tag dis-lensed-galaxy:ci .
      - name: Run CPU checks and CLI smoke tests
        run: docker run --rm dis-lensed-galaxy:ci
