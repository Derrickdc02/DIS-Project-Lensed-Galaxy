stages:
  - test
  - build
  - deploy

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

default:
  interruptible: true

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

.python-base:
  image: python:3.11-bookworm
  cache:
    key:
      files:
        - pyproject.toml
        - requirements/constraints-py311-cpu.txt
    paths:
      - .cache/pip/
  before_script:
    - python -m pip install --upgrade pip
    - >-
      python -m pip install
      --index-url https://download.pytorch.org/whl/cpu
      "torch==2.13.0+cpu"

python:
  extends: .python-base
  stage: test
  script:
    - >-
      python -m pip install
      -c requirements/constraints-py311-cpu.txt
      -e ".[all]"
    - ruff check src tests
    - pytest -q
    - nbqa ruff notebooks
    - python -m build --wheel
    - |
      for command in \
        preprocess-probes \
        train-prior \
        train-prior-lowres \
        sample-posterior \
        sample-prior \
        validate-chi2 \
        validate-pqmass \
        validate-mira \
        reproduce-figure2
      do
        "$command" --help >/dev/null
      done
    - >-
      validate-mira --smoke-test --device cpu
      --num-runs 4 --num-bootstrap 4
      --output mira-smoke.json >/dev/null
  artifacts:
    when: always
    paths:
      - dist/
      - mira-smoke.json
    expire_in: 7 days

shell:
  image: debian:bookworm-slim
  stage: test
  before_script:
    - apt-get update
    - apt-get install --yes bash grep shellcheck shfmt
  script:
    - >-
      bash -n
      scripts/lib/hpc_common.sh
      scripts/run_stage2.sh
      scripts/run_stage3.sh
      scripts/run_sample.sh
      scripts/run_sample_prior.sh
    - >-
      shellcheck --severity=warning
      scripts/lib/hpc_common.sh
      scripts/run_stage2.sh
      scripts/run_stage3.sh
      scripts/run_sample.sh
      scripts/run_sample_prior.sh
    - >-
      shfmt -d -i 4
      scripts/lib/hpc_common.sh
      scripts/run_stage2.sh
      scripts/run_stage3.sh
      scripts/run_sample.sh
      scripts/run_sample_prior.sh
    - |
      if grep -R -n -E '(^|[^[:alnum:]_])eval([^[:alnum:]_]|$)|`|machine\.file|PBS_NODEFILE|mpirun|mpiexec|OMPI_MCA|(^|[[:space:]])np=' scripts; then
        echo "Legacy HPC launcher pattern detected" >&2
        exit 1
      fi

docs:
  extends: .python-base
  stage: build
  script:
    - >-
      python -m pip install
      -c requirements/constraints-py311-cpu.txt
      -e ".[docs]"
    - sphinx-build -W --keep-going -b html docs docs/_build/html
  artifacts:
    paths:
      - docs/_build/html/
    expire_in: 7 days

container:
  image: docker:27-cli
  stage: build
  services:
    - name: docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    HEALTHCHECK_TCP_PORT: "2375"
  script:
    - docker build --tag dis-lensed-galaxy:ci .
    - docker run --rm dis-lensed-galaxy:ci

deploy-pages:
  image: alpine:3.20
  stage: deploy
  needs:
    - job: docs
      artifacts: true
  script:
    - mkdir public
    - cp -r docs/_build/html/. public/
  pages: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
